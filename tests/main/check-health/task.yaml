summary: mem0 config validator flags an unusable config (launch-free)

# The previous launch-based task asserted MATCH/NOMATCH on `workshop info`, but
# those passed vacuously (the default config reaches okay, so no "model not set"
# string ever appears). Run the config validator's unit tests directly instead:
# they confirm it flags a missing model, a cloud provider without an API key,
# and an ollama embedder without dims, and stays silent on a good config — which
# is exactly what hooks/check-health keys its health verdict on. Pure stdlib, so
# it needs neither a launch nor the workshop venv.

execute: |
    python3 ../../test_healthcheck.py

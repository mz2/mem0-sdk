name: Build SDK

on:
  pull_request:
    branches:
      - latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # GitHub-hosted runners (amd64 + arm64; arm64 hosted runners are free for
  # public repos). Fresh LXD + sdkcraft per run, managed-mode pack.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          channel: 6/stable
      - name: Install sdkcraft
        run: sudo snap install sdkcraft --classic
      - name: Pack SDK for ${{ matrix.arch }}
        run: sdkcraft --verbose pack --build-for ${{ matrix.arch }}

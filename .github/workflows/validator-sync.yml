name: validator-sync

# The spread suite tests copies under tests/ (sdkcraft test only syncs the
# tests/ directory into the test system, so files under config/ are not
# reachable there). Each tested copy must be byte-identical to its shipped
# config/ original. This check runs on the full checkout, where both exist, and
# fails the PR if any diverge — the enforcement the in-container guard cannot
# provide.
on:
  pull_request:
    branches: [latest, main]

jobs:
  in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tests/ copies must match config/
        run: |
          status=0
          for f in mem0_healthcheck.py mem0_render_config.py; do
            if ! diff "config/$f" "tests/$f"; then
              echo "::error::tests/$f drifted from config/$f — re-copy: cp config/$f tests/$f"
              status=1
            fi
          done
          exit $status

name: Build and Upload SDK

on:
  push:
    branches:
      - latest
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name (e.g., latest)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # GitHub-hosted runners (amd64 + arm64; arm64 hosted runners are free for
  # public repos, billed as larger runners on private repos). Each runner has
  # passwordless sudo, so we install LXD + sdkcraft per run and pack in managed
  # mode — a single LXD nesting level, so snapd/apparmor work normally.
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          channel: 6/stable

      - name: Install sdkcraft
        run: sudo snap install sdkcraft --classic

      - name: Define track name
        run: |
          TRACK="${INPUT_BRANCH:-${GITHUB_REF#refs/heads/}}"
          echo "TRACK=$TRACK" >> "$GITHUB_ENV"
        env:
          INPUT_BRANCH: ${{ inputs.branch }}

      - name: Pack SDK for ${{ matrix.arch }}
        run: sdkcraft --verbose pack --build-for ${{ matrix.arch }}

      - name: Upload ${{ matrix.arch }} SDK
        env:
          SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS }}
        run: |
          for sdk in *.sdk; do
            sdkcraft --verbose upload "$sdk" --release "${TRACK}/stable"
          done
